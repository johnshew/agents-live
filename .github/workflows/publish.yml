name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. v0.1.2)"
        required: true

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: astral-sh/setup-uv@v5
      # The release gates (.agents/release.md) all run here too, so a
      # manually dispatched tag can never publish an unaudited artifact.
      - run: uv run --script tools/pre-release-audit.py
      - run: uv run --with-editable . python -m unittest tests.test_smoke
      - run: uv build
      # Attach the exact artifacts going to PyPI before publishing, so a
      # failed upload can be rerun without hitting PyPI's duplicate check.
      - run: gh release upload "$TAG" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
      - run: uv publish --trusted-publishing always
